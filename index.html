<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#fcfaf4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Free QR Code Generator with Logo — No Sign Up, PNG &amp; SVG</title>
    <meta
      name="description"
      content="Design custom QR codes in your browser: colors, gradients, dot styles, and logo overlays. Free, no sign-up — your data never leaves your machine. Export as PNG or SVG."
    />
    <link rel="canonical" href="https://qr-code-gen.frontsail.app/" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QR Code Generator by FrontSail AI" />
    <meta property="og:title" content="Free QR Code Generator with Logo — No Sign Up" />
    <meta
      property="og:description"
      content="Design custom QR codes in your browser: colors, gradients, dot styles, and logo overlays. Free, no sign-up. Export as PNG or SVG."
    />
    <meta property="og:url" content="https://qr-code-gen.frontsail.app/" />
    <meta property="og:image" content="https://qr-code-gen.frontsail.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- IBM Plex loads here (not via CSS @import): the production CSS bundler
         drops @import rules that end up mid-file, which silently disabled the
         brand fonts in deployed builds -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebApplication",
            "@id": "https://qr-code-gen.frontsail.app/#webapp",
            "name": "QR Code Generator",
            "url": "https://qr-code-gen.frontsail.app/",
            "description": "Free QR code generator that runs entirely in your browser. Create custom QR codes for URLs, email, phone numbers, plain text, and vCards, with color, dot-style, and logo customization. No sign-up, no data sent to a server.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any (Web Browser)",
            "browserRequirements": "Requires JavaScript",
            "isAccessibleForFree": true,
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "publisher": { "@id": "https://frontsail.ai/#organization" },
            "creator": { "@id": "https://frontsail.ai/#organization" }
          },
          {
            "@type": "Organization",
            "@id": "https://frontsail.ai/#organization",
            "name": "FrontSail AI",
            "url": "https://frontsail.ai"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
